<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocapps</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    .box {
      padding: 40px 30px;
    }
    h1 { font-size: 2.5em; margin-bottom: 8px; }
    p { opacity: 0.8; margin-bottom: 30px; font-size: 1.05em; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 0.95em; opacity: 0.75; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Vocapps</h1>
    <p>Apprendre des mots en s'amusant</p>
    <div class="spinner"></div>
    <div class="msg" id="msg">Détection de ton appareil...</div>
  </div>

  <script>
    // Détection : Safari 9 / iOS 9 ne supporte pas fetch
    // Tous les navigateurs modernes le supportent
    if (typeof fetch === 'undefined') {
      document.getElementById('msg').textContent = 'Ancienne version chargée...';
      window.location.replace('vocapps-ios9.html');
    } else {
      document.getElementById('msg').textContent = 'Chargement...';
      window.location.replace('app.html');
    }
  </script>
</body>
</html>
